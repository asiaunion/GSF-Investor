name: Weekly Dividend Calendar Update

# KST 일요일 22:00 = UTC 13:00 (주간 종가·환율 수집 이후)
on:
  schedule:
    - cron: "0 13 * * 0"
  workflow_dispatch:

jobs:
  update-dividends:
    name: Update dividend_events from yfinance
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run update_dividend_calendar.py
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          REAL_DATA_RUN_ACK: I_ACK_PROD_WRITE
        run: python3 scripts/update_dividend_calendar.py
