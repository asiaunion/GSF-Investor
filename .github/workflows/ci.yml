name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Environment (debug 01164f)
        run: |
          node -v
          npm -v
          test -f eslint.config.mjs && head -25 eslint.config.mjs || echo "MISSING eslint.config.mjs"
          node -e "console.log('lint script:', require('./package.json').scripts.lint)"

      - name: Install
        run: npm ci

      - name: Lint
        run: |
          npm run lint || {
            echo "=== npm run lint failed; eslint report ==="
            npx eslint -f stylish . 2>&1 | tail -100 || true
            npx eslint -f json -o eslint-report.json . 2>/dev/null || true
            node -e "
              const r=require('./eslint-report.json');
              const e=r.reduce((a,f)=>a+f.errorCount,0);
              const w=r.reduce((a,f)=>a+f.warningCount,0);
              const bad=r.filter(f=>f.errorCount>0).map(f=>f.filePath+':'+f.errorCount);
              console.log('eslint errors='+e+' warnings='+w);
              if(bad.length) console.log('error files:', bad.join(', '));
            " 2>/dev/null || true
            exit 1
          }

      - name: CI diagnose (debug 01164f)
        if: failure()
        run: node scripts/ci-diagnose.mjs
        env:
          DEBUG_RUN_ID: gha-${{ github.run_id }}
          DEBUG_LOG_PATH: ${{ github.workspace }}/.cursor/debug-01164f.log
          GITHUB_ACTIONS: "true"
          CI: "true"

      - run: npm test

      - run: npm run build
        env:
          TURSO_DATABASE_URL: file:./ci-build.db
          TURSO_AUTH_TOKEN: ""
          AUTH_SECRET: ci-build-secret-min-32-chars-long
          AUTH_URL: http://localhost:3000
