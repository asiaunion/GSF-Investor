name: Quarterly Financials Auto-Collection

# DART 사업보고서·분기보고서 제출 일정 기준:
#   Q1 (1분기): 5월 중순 제출 → 5월 20일 수집
#   Q2 (2분기): 8월 중순 제출 → 8월 20일 수집
#   Q3 (3분기): 11월 중순 제출 → 11월 20일 수집
#   FY (사업보고서): 3월 말 제출 → 4월 5일 수집
# UTC 기준 (KST -9h)
on:
  schedule:
    - cron: "0 22 20 5 *"    # 5월 20일 KST 07:00
    - cron: "0 22 20 8 *"    # 8월 20일 KST 07:00
    - cron: "0 22 20 11 *"   # 11월 20일 KST 07:00
    - cron: "0 22 5 4 *"     # 4월 5일 KST 07:00 (FY)
  workflow_dispatch:
    inputs:
      ticker:
        description: "특정 종목만 처리 (비워두면 전종목)"
        required: false
        default: ""
      dry_run:
        description: "DRY_RUN=1 (DB 쓰기 생략)"
        required: false
        default: "0"

jobs:
  collect-financials:
    name: Collect DART Financials (All Active KR Stocks)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run auto_financials.py
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN:   ${{ secrets.TURSO_AUTH_TOKEN }}
          DART_API_KEY:       ${{ secrets.DART_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          REAL_DATA_RUN_ACK:  I_ACK_PROD_WRITE
          DRY_RUN:            ${{ github.event.inputs.dry_run || '0' }}
        run: |
          TICKER="${{ github.event.inputs.ticker }}"
          if [ -n "$TICKER" ]; then
            python3 scripts/auto_financials.py --ticker "$TICKER"
          else
            python3 scripts/auto_financials.py
          fi

      - name: Notify failure via Telegram
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="🔴 <b>재무 자동수집 실패</b>%0A워크플로: quarterly_financials%0A$(date '+%Y-%m-%d %H:%M KST')" \
            -d parse_mode="HTML"
