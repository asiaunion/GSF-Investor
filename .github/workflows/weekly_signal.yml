name: Weekly Signal Aggregation

# 일요일 KST 21:00 = UTC 12:00
on:
  schedule:
    - cron: "0 12 * * 0"   # UTC 12:00 일요일 (KST 21:00)
  workflow_dispatch:         # 수동 실행 (테스트용)

jobs:
  weekly-signal:
    name: Weekly Signal Analysis (LOW/MEDIUM)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run weekly_signal.py
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN:   ${{ secrets.TURSO_AUTH_TOKEN }}
        run: python3 scripts/weekly_signal.py
