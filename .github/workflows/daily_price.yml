name: Daily Price Collection

# KST 07:00 = UTC 22:00 (전날)
# 예: KST 2026-05-16 07:00 → UTC 2026-05-15 22:00
on:
  schedule:
    - cron: "0 22 * * 1-5"   # UTC 22:00, 월~금 (한국 평일 기준)
  workflow_dispatch:          # 수동 실행 (테스트용)

jobs:
  collect-prices:
    name: Collect Daily Prices & Exchange Rate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── 1. 소스 체크아웃 ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python 셋업 ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      # ── 3. 의존성 설치 ──────────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # ── 4. 스크립트 실행 ────────────────────────────────────────────────────
      - name: Run daily_price.py
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN:   ${{ secrets.TURSO_AUTH_TOKEN }}
          REAL_DATA_RUN_ACK: I_ACK_PROD_WRITE
        run: python3 scripts/daily_price.py

      # ── 5. 실패 시 알림 (선택 — Slack/Telegram 연동 시 활성화) ────────────
